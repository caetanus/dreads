name: docker

# Publish images to GHCR on every version tag (v*), e.g. v0.1.0. Two variants,
# like Redis/Valkey: a glibc default (:X.Y.Z, :latest) and a slim musl/Alpine
# build (:X.Y.Z-alpine, :alpine). The glibc one is faster; the alpine one is ~1/2
# the size — pick per need.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: build + push images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules (HTTPS)
        run: |
          git config url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- glibc (distroless) — the default image ----
      - name: Metadata (glibc)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dreads
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build + push (glibc)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ---- musl (Alpine) — the slim variant, -alpine suffix ----
      - name: Metadata (alpine)
        id: meta_alpine
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/dreads
          flavor: suffix=-alpine,latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build + push (alpine)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.alpine
          push: true
          tags: ${{ steps.meta_alpine.outputs.tags }}
          labels: ${{ steps.meta_alpine.outputs.labels }}
