name: docker

# Publish multi-arch images to GHCR on every version tag (v*). Two variants, like
# Redis/Valkey: a glibc default (:X.Y.Z, :latest) and a slim musl/Alpine build
# (:X.Y.Z-alpine, :alpine).
#
# NATIVE multi-arch (no QEMU): each architecture is built on its OWN native runner
# — amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm — and pushed to GHCR BY DIGEST
# (no tag). A final merge job stitches the per-arch digests into one manifest list
# per variant and tags it. Native compiles are far faster and more reliable than
# emulating aarch64 under QEMU on an x86 host.
on:
  push:
    tags: ['v*']

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/dreads

jobs:
  # ---- per-arch build, pushed by digest (no tag yet) ----
  build:
    name: build ${{ matrix.variant }} ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: glibc,  file: Dockerfile,        platform: linux/amd64, runner: ubuntu-latest }
          - { variant: glibc,  file: Dockerfile,        platform: linux/arm64, runner: ubuntu-24.04-arm }
          - { variant: alpine, file: Dockerfile.alpine, platform: linux/amd64, runner: ubuntu-latest }
          - { variant: alpine, file: Dockerfile.alpine, platform: linux/arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules (HTTPS)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - name: Sanitize platform pair
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build this single platform natively and push the image blob by digest.
      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.variant }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---- merge the per-arch digests into one multi-arch manifest per variant ----
  merge:
    name: merge manifest (${{ matrix.variant }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        variant: [glibc, alpine]
    steps:
      - name: Download this variant's digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # alpine variant gets the -alpine suffix and never :latest
          flavor: ${{ matrix.variant == 'alpine' && 'suffix=-alpine,latest=false' || '' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create + push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
