name: windows

# Windows build CI: a fully static (libcmt) x64 dreads.exe — posix syscall shims,
# vibe-core, static libsodium (vcpkg) + vendored lua/lz4 (/MT). Publishes the exe
# as a versioned artifact. Runs on master + PRs (badge on the README).
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (windows-latest, ldc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so `git describe` resolves the version

      - name: Fetch submodules (HTTPS)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-1.42.0

      # cl/lib for the vendored lua+lz4 PowerShell builds (preBuildCommands-windows).
      - uses: ilammy/msvc-dev-cmd@v1

      # Static libsodium.lib for the link (jemalloc is libs-linux, skipped here).
      # x64-windows-static builds with the static CRT (/MT), matching dreads'
      # -mscrtlib=libcmt and the /MT lua+lz4 objects → a fully static .exe. Put its
      # lib dir on LIB so link.exe finds libsodium.lib (msvc-dev-cmd set LIB first).
      - name: Install libsodium (vcpkg, static)
        shell: pwsh
        run: |
          vcpkg install libsodium:x64-windows-static
          $lib = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\lib"
          "LIB=$lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build
        run: dub build --compiler=ldc2

      # Name the exe by version (git describe): dreads-<ver>.exe.
      - name: Package versioned exe
        shell: bash
        run: |
          VER=$(git describe --tags --always)
          cp bin/dreads.exe "bin/dreads-${VER}.exe"
          echo "DREADS_VER=${VER}" >> "$GITHUB_ENV"

      # Publish the .exe so it can be pulled down and smoke-tested (e.g. under Wine).
      - name: Upload dreads.exe
        uses: actions/upload-artifact@v4
        with:
          name: dreads-${{ env.DREADS_VER }}
          path: bin/dreads-${{ env.DREADS_VER }}.exe
          if-no-files-found: error
