name: windows

# Exploratory Windows build probe. Lives ONLY on the windows-build branch (never
# merged to master) — triggers on push to that branch + manual dispatch, so it
# doesn't run on the mainline. Goal: get the real LDC/Windows error surface for
# the port (posix syscalls, vibe-core, libsodium.lib linking).
on:
  push:
    branches: [windows-build]
  workflow_dispatch:

jobs:
  build:
    name: build (windows-latest, ldc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules (HTTPS)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-1.42.0

      # cl/lib for the vendored lua+lz4 PowerShell builds (preBuildCommands-windows).
      - uses: ilammy/msvc-dev-cmd@v1

      # libsodium.lib for the link (jemalloc is libs-linux, skipped here). vcpkg is
      # preinstalled on windows-latest.
      - name: Install libsodium (vcpkg)
        shell: pwsh
        run: |
          vcpkg install libsodium:x64-windows-static
          "SODIUM_LIB=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\lib" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build
        run: dub build --compiler=ldc2
