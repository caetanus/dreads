name: macos

# macOS build CI: Apple Silicon (arm64). macOS is real POSIX; the only shims are
# Darwin's missing fdatasync (-> fsync) and clock_gettime (-> gettimeofday). The
# -mcpu=x86-64-v3 dflag is x86_64-gated in dub.json, so arm64 skips it. Runs on
# master + PRs (badge on the README).
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (macos-latest/arm64, ldc)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules (HTTPS)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-1.42.0

      # libsodium via Homebrew (jemalloc is libs-linux, skipped here). Put its lib
      # dir on LIBRARY_PATH so ld finds -lsodium.
      - name: Install libsodium
        run: |
          brew install libsodium
          echo "LIBRARY_PATH=$(brew --prefix libsodium)/lib:${LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      # vendor/lua+lz4 build.sh run as preBuildCommands-posix (bash, on macOS too).
      - name: Build
        run: dub build --compiler=ldc2
