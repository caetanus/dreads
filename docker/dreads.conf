# dreads default config, baked into the container image.
#
# Configure it the same three ways you configure redis/valkey — combine freely,
# LATER OVERRIDES EARLIER (this file < env vars < command-line args):
#
#   1) VOLUME or COPY (bake): put your own file over /etc/dreads/dreads.conf
#        docker run -v ./my.conf:/etc/dreads/dreads.conf dreads
#        # or in a derived image:  COPY my.conf /etc/dreads/dreads.conf
#      (or point elsewhere with  DREADS_CONFIG_FILE=/path/to/your.conf)
#
#   2) ENV (kubernetes lingua franca):  DREADS_<DIRECTIVE>=value
#        DREADS_MAXMEMORY=256mb           -> maxmemory 256mb
#        DREADS_MAXMEMORY_POLICY=allkeys-lru
#        DREADS_RAFT_NODE_ID=1            (underscores become dashes)
#      The entrypoint turns these into --<directive> value.
#
#   3) COMMAND-LINE (redis-server style):
#        docker run dreads --maxmemory 256mb --appendonly yes
#
port 6379
dir /data
