# dreads config for Valkey blackbox suite runs.
# Active expiration is OPT-IN in dreads (it costs ~40% on SET-EX, lazy expire
# is the fast default), but the suite assumes Redis's always-on reaper.
active-expire yes
# Background maxmemory eviction is likewise opt-in (the write path frees on
# demand); the suite expects Redis's cron reaper — a key can be evicted without
# a subsequent write.
active-eviction yes
# Raft election timeout, in ticks of 20ms each (default 50 -> ~1-2s randomized).
# A follower that hears no leader heartbeat for electionTimeout..2*electionTimeout
# ticks starts an election; lower = faster failover, higher = fewer spurious
# elections. Safe to lower now that raft runs on a dedicated event-loop thread.
# raft-election-timeout 50
# Optional LZ4 compression of the Raft replication wire (log batches + snapshot
# chunks). Off by default: pure overhead on loopback/LAN, a large bandwidth win
# on a constrained/cross-AZ link. A node always DECODES compressed frames; this
# only controls whether it COMPRESSES what it sends (so rolling it on is safe).
# raft-compress no
