# dreads config for Valkey blackbox suite runs.
# Active expiration is OPT-IN in dreads (it costs ~40% on SET-EX, lazy expire
# is the fast default), but the suite assumes Redis's always-on reaper.
active-expire yes
# Background maxmemory eviction is likewise opt-in (the write path frees on
# demand); the suite expects Redis's cron reaper — a key can be evicted without
# a subsequent write.
active-eviction yes
