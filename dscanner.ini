; D-Scanner static-analysis config for dreads.
;
; Run with:  dub lint            (or)  dscanner --styleCheck source/
;
; The intent is a linter that stays SILENT on a clean tree, so every check we
; disable below is justified — it is a genuine false-positive for this codebase,
; not a swept-under-the-rug warning. Everything else (null-deref, unused_result,
; undefined-behaviour, dead code, etc.) stays ON.
[analysis.config.StaticAnalysisConfig]

; Doc-comments on public declarations. dreads is a server binary, not a
; documented library API, so "undocumented public declaration" is pure noise.
undocumented_declaration_check="disabled"

; "variable could be const/immutable". Advisory style only (never a bug). The
; codebase is mutable-by-default for locals on purpose; const-cascading through
; @nogc hot paths buys nothing and churns the diff.
could_be_immutable_check="disabled"

; Phobos camelCase naming. We bind C ABIs whose names are fixed (lua_State,
; fdatasync, lua_* …) and use snake_case wire/RESP helpers — the convention
; simply does not apply here.
style_check="disabled"

; Max line length. The only offender is the ASCII-art banner in logo.d, which is
; data, not code. Formatting is handled by the editor / dfmt, not the linter.
long_line_check="disabled"

; "avoid subtracting from .length (unsigned)". Every such subtraction in the
; codebase is deliberately length-guarded first (e.g. the security-audited
; RESTORE loadString path). Flagging them hides nothing and cries wolf.
length_subtraction_check="disabled"
